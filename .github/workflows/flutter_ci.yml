name: Flutter CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  analyze-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.2
          channel: stable

      - name: Install dependencies
        run: |
          flutter config --no-analytics
          flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

